version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_URL=sqlite:///smart_elearn.db
    volumes:
      - .:/app
      - ./instance:/app/instance
      - ./static/uploads:/app/static/uploads
    restart: unless-stopped

